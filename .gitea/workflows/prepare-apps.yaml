name: prepare-apps

on:
  push:
    branches:
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest
    container:
      image: pandaevo/base:latest
      volumes:
        - pandaevo_apps_workspace:/workspace/apps
    env:
      SKIP_WORKTREE_FILE: python-service/config.yaml
    steps:
      - name: Checkout
        run: |
          apt-get update && apt-get install -y git
          git clone --depth 1 --branch main http://token:${{ vars.APP_TOKEN }}@gitea:3000/pandaevo/apps.git /tmp/repo
          cp -a /tmp/repo/. /workspace/apps/
          git -C /workspace/apps config user.email "bootstrap@pandaevo.local"
          git -C /workspace/apps config user.name "PandaEvo Bootstrap"
          git -C /workspace/apps update-index --skip-worktree "$SKIP_WORKTREE_FILE" 2>/dev/null || true
