name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: CI integrity check
        run: |
          python3 - <<'EOF'
          import subprocess, sys
          _FORBIDDEN = [".gitea/"]
          result = subprocess.run(
              ["git", "diff", "--name-only", "origin/main...HEAD"],
              capture_output=True, text=True,
          )
          violations = [
              f for f in result.stdout.splitlines()
              if any(f == p.rstrip("/") or f.startswith(p) for p in _FORBIDDEN)
          ]
          if violations:
              print(
                  f"INTEGRITY VIOLATION: CI configuration must not "
                  f"be modified via PR: {violations}",
                  file=sys.stderr,
              )
              sys.exit(1)
          print("CI integrity OK")
          EOF
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Copy dist to workspace
        run: |
          cp -r dist/. /workspace/web-pc/dist/
