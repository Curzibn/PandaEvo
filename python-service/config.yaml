env: prod

database:
  url: postgresql+asyncpg://user:password@localhost:5432/pandaevo

workspace:
  root: "/workspace"

service:
  data_dir: "/app/data"

mcp:
  builtin:
    enabled: true
    disabled: []
  servers: []

skills:
  enabled: true
  auto_match: true
  max_skills: 3
  entries: {}

rules:
  enabled: true
  auto_match: true

evolution_core:
  url: "http://evolution-core:10602"

gitea:
  url: "http://gitea:3000"
  org: "pandaevo"

repo_sync:
  enabled: true
  repos:
    - "apps"
  branch: "main"

orchestrator:
  enforce_code_tasks_via_orchestrator: false
  auto_trigger_evolution_after_pr: true

sandbox:
  image: "pandaevo/sandbox:latest"
  mem_limit: "4g"
  nano_cpus: 2000000000
  pids_limit: 256
  network_mode: "bridge"
  idle_timeout_s: 86400
