name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - name: CI integrity check
        run: |
          python3 - <<'EOF'
          import subprocess, sys
          _FORBIDDEN = [".gitea/"]
          result = subprocess.run(
              ["git", "diff", "--name-only", "origin/main...HEAD"],
              capture_output=True, text=True,
          )
          violations = [
              f for f in result.stdout.splitlines()
              if any(f == p.rstrip("/") or f.startswith(p) for p in _FORBIDDEN)
          ]
          if violations:
              print(
                  f"INTEGRITY VIOLATION: CI configuration must not "
                  f"be modified via PR: {violations}",
                  file=sys.stderr,
              )
              sys.exit(1)
          print("CI integrity OK")
          EOF

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          docker build -t localhost:10620/openklos/python-service:${{ github.sha }} .
      - name: Push image
        run: |
          docker push localhost:10620/openklos/python-service:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Inspect running service
        id: svc
        run: |
          NETWORK=$(docker inspect python-service \
            --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}')
          DB_URL=$(docker inspect python-service \
            --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | grep ^DATABASE_URL= | cut -d= -f2-)
          echo "network=$NETWORK" >> $GITHUB_OUTPUT
          echo "db_url=$DB_URL" >> $GITHUB_OUTPUT

      - name: Cleanup stale canary
        run: |
          docker stop python-service-canary 2>/dev/null || true
          docker rm   python-service-canary 2>/dev/null || true

      - name: Start canary on port 10603
        run: |
          docker run -d \
            --name python-service-canary \
            --network ${{ steps.svc.outputs.network }} \
            -p 10603:10600 \
            -e DATABASE_URL="${{ steps.svc.outputs.db_url }}" \
            localhost:10620/openklos/python-service:${{ github.sha }}

      - name: Wait for canary health
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:10603/health > /dev/null; then
              echo "Canary healthy after $((i * 2))s"
              exit 0
            fi
            echo "  attempt $i – waiting 2s..."
            sleep 2
          done
          echo "Canary failed to become healthy within 30s"
          exit 1

      - name: Smoke tests
        run: |
          curl -sf http://localhost:10603/health
          curl -sf http://localhost:10603/providers

      - name: Promote canary to production
        run: |
          docker stop python-service-canary && docker rm python-service-canary
          docker compose -f /workspace/docker-compose.yaml up -d --no-deps python-service
          curl -s -X POST http://python-service:10600/internal/reload || true

      - name: Cleanup canary on failure
        if: failure()
        run: |
          docker stop python-service-canary 2>/dev/null || true
          docker rm   python-service-canary 2>/dev/null || true
